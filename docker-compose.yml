version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: devboard-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devboard
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devboard-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: devboard
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: DevBoardSuperSecretKeyForJWTTokenGeneration2024MustBeLongEnoughForHS256
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: devboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
