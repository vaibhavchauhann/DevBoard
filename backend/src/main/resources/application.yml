spring:
  application:
    name: devboard-backend
  datasource:
    url: jdbc:mysql://localhost:3306/devboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: devboard_user
    password: devboard_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
